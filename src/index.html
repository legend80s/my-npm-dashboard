<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-npm-dashboard</title>
    <!-- description -->
    <meta
      name="description"
      content="pkg-marmot: Your own npm packages download dashboard"
    />
    <!-- keywords -->
    <meta
      name="keywords"
      content="pkg-marmot, npm, dashboard, packages, download"
    />
    <!-- author -->
    <meta name="author" content="legend80s" />

    <!-- favicon -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80'>🐿️</text></svg>"
    />

    <!-- "beautiful-mermaid": "https://unpkg.com/beautiful-mermaid@1.1.3/dist/index.js" -->
    <script type="importmap">
      {
        "imports": {
          "chart.js": "https://esm.sh/chart.js@4.5.1"
        }
      }
    </script>

    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <!-- ===== HEADER ===== -->
    <div
      style="
        display: flex;
        justify-content: end;
        align-items: center;
        font-size: 0.75rem;
        gap: 0.5rem;
        margin-bottom: 1rem;
      "
    >
      <button
        type="button"
        class="btn btn-sm"
        id="refreshBtn"
        title="强制刷新数据（忽略缓存）"
      >
        🔄 刷新
      </button>
      <div class="stat-item" style="text-align: end">
        <!-- 数据来自 <strong id="updateTime">-</strong> -->

        <div class="" style="">
          数据来自 <strong id="updateTime">-</strong>
          <span id="cacheStatus">--</span>
          | <span id="cacheTTL">--</span>
        </div>
      </div>
    </div>
    <header class="header">
      <div class="header-right">
        <form id="searchForm">
          <button type="submit" id="searchBtn" style="">🔍 搜索</button>

          <input
            type="number"
            id="limitInput"
            placeholder="Count"
            title="npm Package Count"
            min="1"
            max="50"
          />

          Latest
          <img
            src="https://static-production.npmjs.com/b9db67253aa3e3ba02f29947a75f0e49.png"
            alt="npm"
            style="width: 1.8rem; border-radius: 22%"
          />
          Packages by

          <input
            type="text"
            id="usernameInput"
            placeholder="npm username"
            title="npm username"
            value=""
          />
        </form>

        <!-- <span class="" id="statusBadge"></span> -->
      </div>
    </header>

    <!-- ===== STATS BAR ===== -->
    <h2 class="stats-bar" id="statsBar">
      <!-- <span class="stat-item">📦 包数 <strong id="pkgCount">-</strong></span> -->
      <!-- <span class="stat-item">📥 周总下载 <strong id="totalDownloads">-</strong></span> -->
      <span class="stat-item">
        🔥 最热包 <strong id="hottestPkg">-</strong>
      </span>
    </h2>

    <!-- ===== GRID ===== -->
    <div class="grid" id="grid">
      <div class="no-results">
        <span class="big">🐿️</span>
        输入 npm 用户名，让 marmot 帮你查看最近发布的包
      </div>
    </div>

    <!-- ============================================================ -->
    <script type="module" src="./index.js"></script>
  </body>
</html>
