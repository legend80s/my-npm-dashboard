<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pkg-marmot: npm dashboard</title>
  <!-- description -->
  <meta name="description" content="pkg-marmot: Your own npm packages download dashboard" />
  <!-- keywords -->
  <meta name="keywords" content="pkg-marmot, npm, dashboard, packages, download" />
  <!-- author -->
  <meta name="author" content="legend80s" />
  
  <!-- favicon -->
  <link
    rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80'>🐿️</text></svg>"
  />

  <!-- "beautiful-mermaid": "https://unpkg.com/beautiful-mermaid@1.1.3/dist/index.js" -->
  <script type="importmap">
    {
      "imports": {
          "chart.js": "https://esm.sh/chart.js@4.5.1"
      }
    }
  </script>

  <style>
      /* ===== Reset & Base ===== */
      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
      }

      body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          background: #0d1117;
          color: #e6edf3;
          min-height: 100vh;
          padding: 20px;
      }

      /* ===== Header ===== */
      .header {
          max-width: 1400px;
          margin: 0 auto 1px auto;
          display: flex;
          flex-wrap: wrap;
          align-items: center;
          justify-content: space-around;
          gap: 16px;
          padding-block: 0 16px;
          padding-inline: 24px;
          /* background: #161b22; */
          border-radius: 12px;
          /* border: 1px solid #30363d; */
      }

      .logo {
          display: flex;
          align-items: center;
          gap: 10px;
          font-size: 2.8rem;
          font-weight: 700;
          color: #f0e6d0;
      }

      .logo span {
          font-size: 150%;
      }

      .header-right {
          display: flex;
          align-items: center;
          gap: 12px;
          flex-wrap: wrap;
      }

      .header-right form {
          display: flex;
          align-items: center;
          gap: 8px;
          flex-wrap: wrap;
      }

      .header-right input[type="text"],
      .header-right input[type="number"] {
          padding: 8px 14px;
          border-radius: 8px;
          border: 1px solid #30363d;
          background: #0d1117;
          color: #e6edf3;
          font-size: 14px;
          outline: none;
          transition: border-color 0.2s;
          width: 150px;
      }

      .header-right input[type="text"]:focus,
      .header-right input[type="number"]:focus {
          border-color: #58a6ff;
      }

      .header-right input[type="number"] {
          width: 70px;
      }

      .header-right button {
          padding: 8px 18px;
          border-radius: 8px;
          border: none;
          background: #238636;
          color: #fff;
          font-size: 14px;
          font-weight: 600;
          cursor: pointer;
          transition: background 0.2s;
      }

      .header-right button:hover {
          background: #2ea043;
      }

      .header-right button:disabled {
          opacity: 0.5;
          cursor: not-allowed;
      }

      .header-right button#refreshBtn {
          padding: 8px 14px;
          border-radius: 8px;
          border: 1px solid #30363d;
          background: #21262d;
          color: #e6edf3;
          font-size: 14px;
          cursor: pointer;
          transition: background 0.2s;
      }

      .header-right button#refreshBtn:hover {
          background: #30363d;
      }

      .header-right button#refreshBtn:disabled {
          opacity: 0.5;
          cursor: not-allowed;
      }

      .status-badge {
          padding: 6px 14px;
          border-radius: 20px;
          font-size: 13px;
          background: #21262d;
          /* border: 1px solid #30363d; */
          color: #8b949e;
          white-space: nowrap;
      }

      .status-badge.loading {
          color: #f0883e;
          border-color: #f0883e;
      }

      .status-badge .count {
          color: #e6edf3;
          font-weight: 600;
      }

      /* ===== Stats Bar ===== */
      .stats-bar {
          max-width: 1400px;
          margin: 0 auto 20px auto;
          display: flex;
          justify-content: center;
          flex-wrap: wrap;
          gap: 2rem;
          padding-inline: 24px;
          padding-block: 0 12px;
          /* background: #161b22; */
          border-radius: 10px;
          /* border: 1px solid #30363d; */
          font-size: 1.5rem;
          color: #8b949e;
      }

      .stats-bar .stat-item {
          display: flex;
          align-items: center;
          gap: 6px;
      }

      .stats-bar .stat-item strong {
          color: #e6edf3;
      }

      /* ===== Grid ===== */
      .grid {
          max-width: 95vw;
          padding-inline: 1rem;
          margin: 0 auto;
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(640px, 1fr));
          gap: 18px;
      }

      /* ===== Card ===== */
      .card {
          background: #161b22;
          border-radius: 12px;
          /* border: 2px solid #30363d; */
          padding: 18px 20px 16px 20px;
          transition: border-color 0.2s, transform 0.15s;
          cursor: pointer;
          display: flex;
          flex-direction: column;
          outline: 3px dotted transparent;
      }

      .card:hover {
          /* border-color: #58a6ff; */
          outline-color: #58a6ff;
          /* add transition: ; */
          transition: outline 1.5s;
          /* transform: translateY(-2px); */
      }

      .card-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 10px;
      }

      .card-name {
          font-size: 17px;
          font-weight: 600;
          color: #f0e6d0;
          word-break: break-all;
      }

      .card-version {
          font-size: 13px;
          padding: 2px 12px;
          border-radius: 20px;
          background: #21262d;
          border: 1px solid #30363d;
          color: #8b949e;
          font-weight: 500;
          white-space: nowrap;
      }

      /* ===== Mermaid Chart Container ===== */
      .chart-container {
          background: #0d1117;
          border-radius: 8px;
          padding: 8px 4px 4px 4px;
          margin-bottom: 10px;
          overflow: hidden;
          min-height: 80px;
          display: flex;
          align-items: center;
          justify-content: center;
      }

      .chart-container .mermaid {
          width: 100%;
          display: flex;
          justify-content: center;
      }

      .chart-container .mermaid svg {
          max-width: 100%;
          height: auto;
      }

      .chart-placeholder {
          color: #8b949e;
          font-size: 13px;
          text-align: center;
          padding: 16px 0;
      }

      /* ===== Card Metrics ===== */
      .card-metrics {
          display: flex;
          flex-wrap: wrap;
          gap: 10px 18px;
          font-size: 13px;
          color: #8b949e;
          margin-bottom: 6px;
      }

      .card-metrics .metric {
          display: flex;
          align-items: center;
          gap: 4px;
      }

      .card-metrics .metric strong {
          color: #e6edf3;
          font-weight: 600;
      }

      .card-metrics .trend-up {
          color: #3fb950;
      }
      .card-metrics .trend-down {
          color: #f85149;
      }
      .card-metrics .trend-flat {
          color: #8b949e;
      }

      .card-footer {
          font-size: 12px;
          color: #484f58;
          border-top: 1px solid #21262d;
          padding-top: 10px;
          margin-top: 4px;
          display: flex;
          justify-content: space-between;
          flex-wrap: wrap;
          gap: 4px 12px;
      }

      .card-footer .repo {
          color: #58a6ff;
          text-decoration: none;
      }

      .card-footer .repo:hover {
          text-decoration: underline;
      }

      /* ===== Error State ===== */
      .card-error {
          background: #161b22;
          border-radius: 12px;
          border: 1px solid #f85149;
          padding: 18px 20px;
          color: #f85149;
          font-size: 14px;
      }

      /* ===== No Results ===== */
      .no-results {
          grid-column: 1 / -1;
          text-align: center;
          padding: 60px 20px;
          color: #8b949e;
          font-size: 16px;
      }

      .no-results .big {
          font-size: 48px;
          display: block;
          margin-bottom: 16px;
      }

      /* ===== Responsive ===== */
      @media (max-width: 600px) {
          .header {
              flex-direction: column;
              align-items: stretch;
              padding: 14px 16px;
          }

          .header-right form {
              flex-direction: column;
              align-items: stretch;
          }

          .header-right input[type="text"],
          .header-right input[type="number"] {
              width: 100%;
          }

          .grid {
              grid-template-columns: 1fr;
          }

          .stats-bar {
              flex-direction: column;
              gap: 6px;
              padding: 12px 16px;
          }
      }

      .chart-container {
          position: relative;
          /* 固定高度方便Chart.js渲染 */
          /* height: 640px;  */
          aspect-ratio: 16 / 9;
          width: 100%;
          background: #0d1117;
          border-radius: 8px;
          padding: 4px;
          margin-bottom: 10px;
      }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
     <div class="stat-item" style="text-align: end;">🕐 数据更新于 <strong id="updateTime">-</strong></div>
    <header class="header">
        

        <h1 class="logo">
            <span>🐿️</span> pkg-marmot
        </h1>
        <div class="header-right">
            <form id="searchForm">
                <input type="text" id="usernameInput" placeholder="npm 用户名" value="" />
                <input type="number" id="limitInput" placeholder="数量" min="1" max="50" />
                <button type="submit" id="searchBtn">🔍 探出</button>
            </form>
            <button type="button" id="refreshBtn" title="强制刷新数据（忽略缓存）">🔄 刷新</button>
            <span class="status-badge" id="statusBadge">就绪</span>
            <span class="status-badge" id="cacheStatus" style="font-size:12px;">--</span>
            <span class="status-badge" id="cacheTTL" style="font-size:11px;color:#484f58;">--</span>
        </div>
    </header>

    <!-- ===== STATS BAR ===== -->
    <h2 class="stats-bar" id="statsBar">
        <!-- <span class="stat-item">📦 包数 <strong id="pkgCount">-</strong></span> -->
        <!-- <span class="stat-item">📥 周总下载 <strong id="totalDownloads">-</strong></span> -->
        <span class="stat-item">🔥 最热包 <strong id="hottestPkg">-</strong></span>
    </h2>

    <!-- ===== GRID ===== -->
    <div class="grid" id="grid">
        <div class="no-results">
            <span class="big">🐿️</span>
            输入 npm 用户名，让 marmot 帮你查看最近发布的包
        </div>
    </div>

    <!-- ============================================================ -->
    <script type="module" src="./index.js" ></script>

</body>
</html>
